name: ETF 알람 텔레그램 봇

on:
  schedule:
    - cron: '5,35 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  check-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance requests pandas numpy

      - name: ETF 신호 체크 및 텔레그램 알람
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_alert.py

      - name: 신호 상태 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_state.json || true
          git diff --staged --quiet || git commit -m "Update signal state"
          git push || true
